---
layout: default
---

<div class="tree-page">
  <h1 class="tree-title">{{ page.title }}</h1>

  <div class="tree-controls">
    <input type="text" id="tree-search" class="tree-search" placeholder="Search posts or categories..." />
    <button type="button" id="tree-collapse-all" class="tree-btn">Collapse all</button>
  </div>

  <div id="tree-root" class="tree-root"></div>
</div>

{%- include tree-data.html -%}

<script src="{{ '/assets/js/category-tree.js' | relative_url }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    window.CategoryTree.build({
      containerId: 'tree-root',
      dataId: 'tree-data',
      searchInputId: 'tree-search',
      collapseAllId: 'tree-collapse-all'
    });
  });
</script>
